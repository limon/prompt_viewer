<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prompt Viewer</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Prompt Viewer</h1>
        <p id="count">Loading images...</p>
      </div>
      <form id="filters" class="filters">
        <input id="search" type="search" placeholder="Search title, filename, prompt, model, LoRA, source">
        <select id="source">
          <option value="">All sources</option>
          <option value="comfyui">comfyui</option>
          <option value="chatgpt">chatgpt</option>
        </select>
        <button type="submit">Search</button>
        <button id="rescan" type="button">Rescan</button>
      </form>
    </header>

    <main>
      <section class="uploadPanel" id="uploadPanel">
        <div class="sourceTabs" id="sourceTabs" aria-label="Source filter">
          <button type="button" data-source="">All</button>
          <button type="button" data-source="comfyui">ComfyUI</button>
          <button type="button" data-source="chatgpt">ChatGPT</button>
        </div>
        <div class="uploadControls">
          <label class="dropZone" id="dropZone">
            <input id="fileInput" type="file" multiple accept=".png,.jpg,.jpeg,image/png,image/jpeg">
            <span id="dropLabel">Drop ComfyUI* or ChatGPT* images, or choose files</span>
          </label>
          <button id="uploadButton" type="button" disabled>Upload</button>
        </div>
        <div class="uploadList" id="uploadList"></div>
      </section>
      <section id="grid" class="grid" aria-live="polite"></section>
      <nav class="pager">
        <button id="prev" type="button">Previous</button>
        <span id="pageLabel">Page 1</span>
        <button id="next" type="button">Next</button>
      </nav>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
